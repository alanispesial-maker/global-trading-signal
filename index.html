<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Trading Desk PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070f;
  color:#e5e7eb;
}
.app{
  width:100%;
  max-width:420px;
  margin:auto;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:1000;
  padding:12px;
  text-align:center;
  font-weight:bold;
  background:linear-gradient(90deg,#0f172a,#111827,#0f172a);
}
.online{color:#22c55e;font-size:12px}

/* BOX */
.container{padding:12px}
.box{
  background:#0b1220;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
}

/* CHART */
#tv_chart{
  width:100%;
  height:260px;
}

/* SIGNAL */
.signal-box{
  padding:14px;
  background:#0f172a;
  border-radius:14px;
  text-align:center;
  animation:glowSignal 1s infinite alternate;
}
@keyframes glowSignal{
  from{box-shadow:0 0 8px #22c55e;}
  to{box-shadow:0 0 30px #22c55e;}
}
.signal-buy{color:#22c55e;font-weight:bold;font-size:18px;}
.signal-sell{color:#ef4444;font-weight:bold;font-size:18px;}

/* HISTORY */
#history{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.history-item{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  animation:glowHistory 1.2s infinite alternate;
}
@keyframes glowHistory{
  from{box-shadow:0 0 5px #facc15;}
  to{box-shadow:0 0 20px #facc15;}
}
.profit{
  color:#facc15;
  font-weight:bold;
  font-size:18px;
}

/* CHAT */
.chat-box{max-height:140px;overflow:hidden}
.chat{
  font-size:12px;
  padding:6px;
  margin:4px 0;
  background:#0f172a;
  border-radius:8px;
}
.chat-input{display:flex;margin-top:8px;}
.chat-input input{flex:1;padding:6px;border:none;border-radius:6px;}
.chat-input button{
  margin-left:6px;
  padding:6px 10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
}

/* FLOAT PROFIT */
#profitPopup{
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  border:1px solid #22c55e;
  padding:6px 14px;
  border-radius:10px;
  font-size:12px;
  font-weight:bold;
  opacity:0;
  z-index:9999;
}
@keyframes floatUp{
  0%{transform:translate(-50%, 40px);opacity:0;}
  30%{opacity:1;}
  100%{transform:translate(-50%, -40px);opacity:0;}
}
</style>
</head>

<body>

<div class="app">

<header>
🌍 GLOBAL TRADING DESK PRO<br>
<span id="online" class="online"></span>
</header>

<div class="container">

<div class="box">
📡 Server: ONLINE | ⚡ Latency: 12ms | 🧠 AI ACTIVE
</div>

<!-- CHART -->
<div class="box">
<h3>📈 Live Chart</h3>
<div id="tv_chart"></div>
</div>

<!-- SIGNAL -->
<div class="box">

<div style="text-align:center;margin-bottom:6px;">
🔥 WIN RATE <span style="color:#22c55e;font-size:18px;font-weight:bold">97%</span>
</div>

<h3>📡 SIGNAL</h3>
<div id="signal">Loading...</div>

</div>

<!-- HISTORY -->
<div class="box">
<h3>📜 WIN HISTORY</h3>
<div id="history"></div>
</div>

<!-- CHAT -->
<div class="box">
<h3>💬 LIVE CHAT</h3>
<div id="chat" class="chat-box"></div>

<div class="chat-input">
<input id="chatInput" placeholder="Ketik chat...">
<button onclick="sendChat()">Kirim</button>
</div>

</div>

</div>
</div>

<div id="profitPopup"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* ONLINE USERS */
setInterval(()=>{
  let base = 6000000 + Math.floor(Math.random()*4000000);
  document.getElementById("online").innerText =
    base.toLocaleString()+"+ users online";
},2000);

/* LOAD CHART */
setTimeout(()=>{
  new TradingView.widget({
    width:"100%",
    height:260,
    symbol:"OANDA:XAUUSD",
    interval:"5",
    theme:"dark",
    container_id:"tv_chart"
  });
},1000);

/* SIGNAL REAL ANALISA */
async function getSignal(){
  try{
    let res = await fetch("https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=5min&outputsize=100&apikey=f6c0ed8c2d3641bcb6f00879919d479f");
    let data = await res.json();

    let closes = data.values.map(v=>parseFloat(v.close)).reverse();

    function getRSI(period=14){
      let gains=0,losses=0;
      for(let i=closes.length-period;i<closes.length;i++){
        let diff = closes[i] - closes[i-1];
        if(diff>0) gains+=diff;
        else losses+=Math.abs(diff);
      }
      let rs = gains / (losses || 1);
      return 100 - (100/(1+rs));
    }

    function getEMA(period){
      let k = 2/(period+1);
      let ema = closes[0];
      for(let i=1;i<closes.length;i++){
        ema = closes[i]*k + ema*(1-k);
      }
      return ema;
    }

    let rsi = getRSI(14);
    let ema20 = getEMA(20);
    let ema50 = getEMA(50);

    let last = closes.at(-1);
    let prev = closes.at(-2);

    let type = "WAIT";

    if(last > ema20 && ema20 > ema50 && rsi < 70 && last > prev){
      type = "BUY";
    }
    else if(last < ema20 && ema20 < ema50 && rsi > 30 && last < prev){
      type = "SELL";
    }

    renderSignal(type,last,rsi);

  }catch{
    renderSignal("WAIT",3000,50);
  }
}

/* RENDER SIGNAL */
function renderSignal(type,price,rsi){

  if(type==="WAIT"){
    document.getElementById("signal").innerHTML=`
    <div class="signal-box">
      ⏳ NO TRADE<br>
      Market lagi sideways
    </div>`;
    return;
  }

  let entryLow=(price-1.5).toFixed(2);
  let entryHigh=(price+1.5).toFixed(2);
  let tp=(type==="BUY"?price+35:price-35).toFixed(2);
  let sl=(type==="BUY"?price-20:price+20).toFixed(2);

  document.getElementById("signal").innerHTML=`
  <div class="signal-box">

    <div class="${type==="BUY"?"signal-buy":"signal-sell"}">
      ${type==="BUY"?"🟢 BUY 🚀":"🔴 SELL ⚡"}
    </div>

    <div style="margin-top:8px;">
      🎯 ENTRY<br>
      <span style="color:#facc15">${entryLow} - ${entryHigh}</span>
    </div>

    <div style="margin-top:8px;">
      💰 TP: <span style="color:#facc15">${tp}</span>
    </div>

    <div style="margin-top:6px;">
      🛑 SL: <span style="color:#ef4444">${sl}</span>
    </div>

    <div style="margin-top:8px;font-size:12px;color:#9ca3af;">
      📊 RSI: ${rsi.toFixed(1)}
    </div>

  </div>
  `;

  updateHistory();
}

/* HISTORY */
function updateHistory(){
  let html="";
  for(let i=0;i<3;i++){
    let profit = 5000 + Math.floor(Math.random()*95000);
    html += `
    <div class="history-item">
      🔥 PROFIT HIT<br>
      <span class="profit">💰 $${profit.toLocaleString()}</span>
    </div>`;
  }
  document.getElementById("history").innerHTML = html;
}

/* CHAT AUTO */
setInterval(()=>{
  const msgs=["profit 🔥","TP hit 🚀","mantap 🔥","win 💰","gila cuan 😱"];
  let el=document.createElement("div");
  el.className="chat";
  el.innerText=`User: ${msgs[Math.random()*msgs.length|0]}`;

  let box=document.getElementById("chat");
  box.prepend(el);

  if(box.children.length>6){
    box.removeChild(box.lastChild);
  }
},1500);

/* CHAT MANUAL */
function sendChat(){
  let input = document.getElementById("chatInput");
  let text = input.value.trim();
  if(!text) return;

  let el = document.createElement("div");
  el.className = "chat";
  el.innerText = "You: " + text;

  let box=document.getElementById("chat");
  box.prepend(el);

  if(box.children.length>6){
    box.removeChild(box.lastChild);
  }

  input.value="";
}

/* FLOAT PROFIT */
function showProfit(){
  let el=document.getElementById("profitPopup");
  let p=3000+Math.floor(Math.random()*50000);
  el.innerHTML=`🔥 profit $${p}`;
  el.style.animation="none";
  void el.offsetWidth;
  el.style.animation="floatUp 2s";
}

/* LOOP */
getSignal();
setInterval(getSignal,300000);
setInterval(showProfit,2500);

</script>

</body>
</html>
